  // ══════════════════════════════════════

  function goToStep(wizard, n) {
    const current = wizard.state.step;
    if (n === current) return;

    // Render dynamic steps
    const config = wizard.config;
    if (n === config.checkoutStep) renderCheckout(wizard);

    const forward = n > current;
    const currentStep = wizard.steps[current - 1];
    const targetStep = wizard.steps[n - 1];

    // Outgoing
    currentStep.classList.remove('wizard__step--active');
    currentStep.classList.add(forward ? 'wizard__step--left' : 'wizard__step--right');

    // Incoming: set start position without transition
    targetStep.style.transition = 'none';
    targetStep.classList.remove('wizard__step--left', 'wizard__step--right', 'wizard__step--active');
    targetStep.classList.add(forward ? 'wizard__step--right' : 'wizard__step--left');
    targetStep.offsetHeight; // force reflow

    // Animate to active
    targetStep.style.transition = '';
    targetStep.classList.remove('wizard__step--left', 'wizard__step--right');
    targetStep.classList.add('wizard__step--active');

    wizard.state.step = n;

    // Toggle cover-active class for interstitial full-bleed
    if (config.interstitialStep) {
      wizard.el.classList.toggle('wizard--cover-active', n === config.interstitialStep);

      // Trigger fade-in animations when navigating to the interstitial
      const coverEl = targetStep.querySelector('.vd-bg');
      if (coverEl) {
        if (n === config.interstitialStep) {
          var gemEls = targetStep.querySelectorAll('[data-vd-gemstone]');
          if (gemEls.length && wizard.state.selectedCase) gemEls.forEach(function(el) { el.textContent = wizard.state.selectedCase.name; });
          coverEl.classList.remove('vd-bg--animate');
          void coverEl.offsetWidth; // reflow to restart animations
          coverEl.classList.add('vd-bg--animate');
        } else {
          coverEl.classList.remove('vd-bg--animate');
        }
      }
    }

    renderProgressBar(wizard);
    updateBottomBar(wizard);

    // ARIA announce — build step names from config
    const stepNameMap = {};
    stepNameMap[1] = 'Choose your case';
    if (config.interstitialStep) stepNameMap[config.interstitialStep] = 'What\'s inside your refill';
    stepNameMap[config.scentStep] = 'Choose your scents';
    stepNameMap[config.checkoutStep] = 'Order summary';
    const totalVisibleSteps = config.stepCount - 1; // exclude checkout
    wizard.announcer.textContent = n < config.checkoutStep
      ? 'Step ' + n + ' of ' + totalVisibleSteps + ': ' + (stepNameMap[n] || '')
      : 'Order summary \u2014 your Rollr is ready';

    // Focus heading after transition
    setTimeout(() => {
      const heading = targetStep.querySelector('.step-heading, .ed-heading, .vd-heading, .checkout__heading');
      if (heading) heading.focus();
    }, 320);
  }

  // ══════════════════════════════════════
  // Progress Bar
  // ══════════════════════════════════════

  function renderProgressBar(wizard) {
    const step = wizard.state.step;
    const config = wizard.config;
    const progressEl = wizard.steps[step - 1].querySelector('[data-step-progress]');
    if (!progressEl) return;

    // Trust Builder: hidden on step 1 only
    if (!config.showProgressStep1 && step === 1) {
      progressEl.classList.add('wizard__progress--hidden');
      return;
    }
    progressEl.classList.remove('wizard__progress--hidden');

    // Segment state based on config step mapping
    const isInterstitial = config.interstitialStep && step === config.interstitialStep;
    const caseDone = step > 1;
    const scentDone = step > config.scentStep;
    const scentActive = step >= config.scentStep && step < config.checkoutStep;
    const scentHalf = isInterstitial;
    const cartDone = step === config.checkoutStep;
    const cartActive = false;

    // Progress text (Trust Builder only)
    let progressText = '';
    if (config.id === 'trust') {
      if (isInterstitial || step === config.scentStep) progressText = 'Step 2 of 3';
      else if (step === config.checkoutStep) progressText = 'Step 3/3';
    }

    const segments = [
      { label: 'Case', done: caseDone, active: step === 1, half: false },
      { label: 'Scent', done: scentDone, active: scentActive, half: scentHalf },
      { label: 'Cart', done: cartDone, active: cartActive, half: false }
    ];

    const segs = segments.map(s => {
      let cls = 'progress__seg';
      if (s.done) cls += ' progress__seg--done';
      else if (s.half) cls += ' progress__seg--half';
      else if (s.active) cls += ' progress__seg--active';
      return '<div class="' + cls + '"></div>';
    }).join('');

    const labelHTML = segments.map(s => {
      let cls = '';
      if (s.done) cls = ' progress__label--done';
      else if (s.active || s.half) cls = ' progress__label--active';
      return '<span class="' + cls + '">' + s.label + '</span>';
    }).join('');

    progressEl.innerHTML =
      (progressText ? '<div class="wizard__progress-text">' + progressText + '</div>' : '') +
      '<div class="progress">' + segs + '</div>' +
      '<div class="progress__labels">' + labelHTML + '</div>';
  }

  // ══════════════════════════════════════
  // Bottom Bar
  // ══════════════════════════════════════

  function updateBottomBar(wizard) {
    const state = wizard.state;
    const config = wizard.config;
    const step = state.step;

    // Show/hide back button (visible on steps 2+)
    wizard.barBack.classList.toggle('wizard__bar-back--hidden', step <= 1);

    // Hide CTA on checkout (bar stays for back button)
    if (step === config.checkoutStep) {
      wizard.barCta.style.display = 'none';
      wizard.barSummary.innerHTML = '';
      return;
    }
    wizard.barCta.style.display = '';
    wizard.barEl.classList.remove('wizard__bar--hidden');

    // Summary text
    let summary = '';
    if (step === 1 || (config.interstitialStep && step === config.interstitialStep)) {
      // Case step or interstitial: show case selection
      if (state.selectedCase) {
        summary = '<strong>' + state.selectedCase.name + '</strong><span class="bar-price">\u00a3' + state.selectedCase.price + '</span>';
      }
    } else if (step === config.scentStep) {
      const parts = [];
      if (state.selectedCase) parts.push(state.selectedCase.name + ' case');
      if (state.totalRefills > 0) parts.push(state.totalRefills + ' refill' + (state.totalRefills > 1 ? 's' : ''));
      summary = parts.length ? '<strong>' + parts.join(' + ') + '</strong>' : 'Select your scents';
    }

    // Animate summary change
    const prevText = wizard.barSummary.innerHTML;
    wizard.barSummary.innerHTML = summary;
    if (prevText !== summary && summary !== 'Select a case' && summary !== 'Select your scents') {
      wizard.barSummary.classList.remove('wizard__bar-summary--animate');
      wizard.barSummary.offsetHeight;
      wizard.barSummary.classList.add('wizard__bar-summary--animate');
    }

    // CTA text and state
    const cta = wizard.barCta;
    if (step === config.scentStep) {
      // Final CTA — scent step is now the last real step
      cta.classList.add('wizard__bar-cta--final');
      cta.textContent = 'Add to Cart \u2014 ' + formatPrice(state.orderTotal);
      cta.disabled = state.totalRefills < 1;
    } else {
      cta.classList.remove('wizard__bar-cta--final');
      cta.textContent = (config.interstitialStep && step === config.interstitialStep) ? 'Choose your scents' : (step === 1 ? 'Continue to scent' : 'Continue');
      cta.disabled = !state.canContinue;
    }
  }

  // ══════════════════════════════════════
  // Scent Review Rotation (Trust Builder)
  // ══════════════════════════════════════

  function setupCaseReviews(reviewEl) {
    let idx = 0;

    function show() {
      const r = caseReviews[idx];
      reviewEl.innerHTML =
        '<div class="s2-review__stars">' + '\u2605'.repeat(r.stars) + '</div>' +
        '<div>\"' + r.text + '\"</div>' +
        '<div class="s2-review__author">\u2014 ' + r.author + '</div>';
    }

    show();
    setInterval(() => {
      reviewEl.style.opacity = '0';
      setTimeout(() => {
        idx = (idx + 1) % caseReviews.length;
        show();
        reviewEl.style.opacity = '1';
      }, 300);
    }, 5000);
  }

  function setupScentReviews(reviewEl) {
    const allReviews = [];
    scents.forEach(s => {
      s.reviews.forEach(r => {
        allReviews.push({ text: r.text, stars: r.stars, author: r.author, scentName: s.name });
      });
    });
    let idx = 0;

    function show() {
      const r = allReviews[idx];
      reviewEl.innerHTML =
        '<div class="s2-review__stars">' + '\u2605'.repeat(r.stars) + '</div>' +
        '<div>\"' + r.text + '\"</div>' +
        '<div class="s2-review__author">\u2014 ' + r.author + ', on ' + r.scentName + '</div>';
    }

    show();
    setInterval(() => {
      reviewEl.style.opacity = '0';
      setTimeout(() => {
        idx = (idx + 1) % allReviews.length;
        show();
        reviewEl.style.opacity = '1';
      }, 300);
    }, 5000);
  }

  // ══════════════════════════════════════
  // Wizard Reset
  // ══════════════════════════════════════

  function resetWizard(wizard) {
    const config = wizard.config;
    // Clear visual selections on scent step — reset all cards to Add state
    wizard.steps[config.scentStep - 1].querySelectorAll('.s2-card').forEach(c => {
      c.classList.remove('selected');
      c.dataset.qty = 0;
      var addBtn = c.querySelector('.s2-card__add');
      var stepper = c.querySelector('.s2-stepper');
      if (addBtn) addBtn.style.display = '';
      if (stepper) stepper.style.display = 'none';
    });

    // Reset state
    wizard.state.selectedCase = cases.find(c => c.id === 'rose-quartz') || null;
    wizard.state.scents = scents.filter(s => s.id === 'vetiver');
    wizard.state.scentQty = { vetiver: 1 };
    wizard.state.plan = config.defaultPlan;
    wizard.state.step = config.checkoutStep; // so goToStep sees a change

    // Re-apply visual pre-selection on hero
    if (wizard.state.selectedCase && wizard.heroSelect) {
      wizard.heroSelect(wizard.state.selectedCase.id);
    }
    Object.entries(wizard.state.scentQty).forEach(function([id, qty]) {
      var card = wizard.steps[config.scentStep - 1].querySelector('[data-id="' + id + '"]');
      if (card && qty > 0) {
        card.dataset.qty = qty;
        card.classList.add('selected');
        card.querySelector('.s2-card__add').style.display = 'none';
        var stepper = card.querySelector('.s2-stepper');
        stepper.style.display = '';
        stepper.querySelector('.s2-stepper__qty').textContent = qty;
      }
    });

    goToStep(wizard, 1);
  }

  // ══════════════════════════════════════
  // Sheet Setup (shared per wizard)
  // ══════════════════════════════════════

  function setupWizardSheets(wizard) {
    const card = wizard.previewCard;
    const sheet = card.querySelector('[data-sheet]');
    const backdrop = card.querySelector('[data-sheet-backdrop]');
    const sheetBody = sheet.querySelector('.sheet__body');
    if (!sheet || !backdrop) return;

    let openId = null;

    function openSheet(content) {
      sheetBody.innerHTML = content;
      sheetBody.querySelector('.sheet__close-link').addEventListener('click', closeSheet);
      sheetBody.querySelectorAll('.sheet-accordion__trigger').forEach(function(trigger) {
        trigger.addEventListener('click', function() {
          var item = this.closest('.sheet-accordion__item');
          var accordion = this.closest('.sheet-accordion');
          var body = item.querySelector('.sheet-accordion__body');
          var icon = this.querySelector('.sheet-accordion__icon');
          var isOpen = body.style.maxHeight && body.style.maxHeight !== '0px';
          accordion.querySelectorAll('.sheet-accordion__item').forEach(function(sibling) {
            sibling.querySelector('.sheet-accordion__body').style.maxHeight = '0px';
            sibling.querySelector('.sheet-accordion__icon').textContent = '+';
          });
          if (!isOpen) {
            body.style.maxHeight = body.scrollHeight + 'px';
            icon.textContent = '\u2013';
          }
        });
      });
      sheet.classList.add('open');
      backdrop.classList.add('open');
    }

    function closeSheet() {
      sheet.classList.remove('open');
      backdrop.classList.remove('open');
      openId = null;
    }

    // Delegate clicks for sheet triggers
    card.addEventListener('click', (e) => {
      const caseLearn = e.target.closest('[data-learn]');
      if (caseLearn) {
        e.stopPropagation();
        const id = caseLearn.dataset.learn;
        if (openId === id) { closeSheet(); return; }
        const c = cases.find(x => x.id === id);
        if (c) {
          openId = id;
          openSheet(
            '<div class="sheet__image"><img src="' + c.images[0] + '" alt="' + c.name + '" loading="lazy"></div>' +
            '<div class="sheet__name">' + c.name + '</div>' +
            '<div class="sheet__desc">' + c.detail + '</div>' +
            '<div class="sheet__footer">' +
              '<div class="sheet__price">\u00a3' + c.price + '</div>' +
              '<button class="sheet__close-link" type="button">Close</button>' +
            '</div>'
          );
        }
        return;
      }

      const tapArea = e.target.closest('.s2-card__tap-area');
      if (tapArea) {
        e.stopPropagation();
        const id = tapArea.closest('.s2-card').dataset.id;
        if (openId === id) { closeSheet(); return; }
        const s = scents.find(x => x.id === id);
        if (s) {
          openId = id;
          const r = s.reviews[Math.floor(Math.random() * s.reviews.length)];
          openSheet(
            '<div class="sheet__image"><img src="' + s.image + '" alt="' + s.name + '" loading="lazy">' +
              '<div class="sheet__review">' +
                '<div class="sheet__review-stars">' + '\u2605'.repeat(r.stars) + '</div>' +
                '<div>\"' + r.text + '\"</div>' +
                '<div class="sheet__review-author">\u2014 ' + r.author + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="sheet__header-row">' +
              '<div class="sheet__name">' + s.name + '</div>' +
              '<button class="sheet__close-link" type="button">Close</button>' +
            '</div>' +
            s.description.split('. ').map(function(line) {
              var text = line.endsWith('.') ? line : line + '.';
              return '<div class="sheet__desc">' + text + '</div>';
            }).join('') +
            '<div class="sheet__price-block">' +
              '<div class="sheet__price-main">\u00a36/month</div>' +
              '<div class="sheet__price-sub">\u00a312 per refill \u00b7 Lasts ~2 months</div>' +
            '</div>' +
            '<div class="sheet-accordion sheet-accordion--dividers">' +
              '<div class="sheet-accordion__item">' +
                '<button class="sheet-accordion__trigger" type="button">' +
                  '<span>Ingredients</span>' +
                  '<span class="sheet-accordion__icon">+</span>' +
                '</button>' +
                '<div class="sheet-accordion__body">' +
                  '<div class="sheet-accordion__content">' +
                    '<ul class="product-info__list">' +
                      '<li>Sodium Bicarbonate</li>' +
                      '<li>Tapioca Starch</li>' +
                      '<li>Magnesium Hydroxide</li>' +
                      '<li>Coconut Oil (Cocos Nucifera)</li>' +
                      '<li>Zinc Ricinoleate</li>' +
                      '<li>Natural Fragrance (essential oil blend)</li>' +
                    '</ul>' +
                  '</div>' +
                '</div>' +
              '</div>' +
              '<div class="sheet-accordion__item">' +
                '<button class="sheet-accordion__trigger" type="button">' +
                  '<span>Free from</span>' +
                  '<span class="sheet-accordion__icon">+</span>' +
                '</button>' +
                '<div class="sheet-accordion__body">' +
                  '<div class="sheet-accordion__content">' +
                    '<p class="product-info__text">Parabens, phthalates, aluminium, synthetic fragrances, propylene glycol, and triclosan.</p>' +
                  '</div>' +
                '</div>' +
              '</div>' +
              '<div class="sheet-accordion__item">' +
                '<button class="sheet-accordion__trigger" type="button">' +
                  '<span>How to use</span>' +
                  '<span class="sheet-accordion__icon">+</span>' +
                '</button>' +
                '<div class="sheet-accordion__body">' +
                  '<div class="sheet-accordion__content">' +
                    '<ol class="product-info__steps">' +
                      '<li>Open your Rollr case and remove the ball</li>' +
                      '<li>Empty the refill sachet into the case</li>' +
                      '<li>Add water to the fill line and stir</li>' +
                      '<li>Replace the ball and let it set (2\u20134 hours)</li>' +
                      '<li>Roll on and go \u2014 lasts ~2 months of daily use</li>' +
                    '</ol>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>'
          );
        }
        return;
      }
    });

    backdrop.addEventListener('click', closeSheet);
  }

  // ══════════════════════════════════════
  // Init
  // ══════════════════════════════════════

  document.querySelectorAll('[data-wizard]').forEach(el => {
    const type = el.dataset.wizard;
    const config = type === 'trust' ? TRUST_CONFIG : STANDARD_CONFIG;
    createWizard(el, config);
  });
</script>

<script>
(function() {
  var card = document.querySelector('.preview-card--wizard');
  var hero = document.querySelector('.prototype-hero');
  var header = document.querySelector('.page-header');
  function fit() {
    var headerH = header ? header.offsetHeight : 0;
    var avail = window.innerHeight - headerH - 56;
    var s = Math.min(1, avail / 932);
    card.style.transform = 'scale(' + s + ')';
    hero.style.height = (932 * s) + 'px';
  }
  fit();
  window.addEventListener('resize', fit);
})();
</script>
