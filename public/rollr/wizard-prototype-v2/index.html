<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rollr — Wizard Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Kalice';
    src: url('https://cdn.shopify.com/s/files/1/0743/4318/6698/files/Kalice-Regular.woff2?v=1710785896') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Kalice';
    src: url('https://cdn.shopify.com/s/files/1/0743/4318/6698/files/Kalice-Italic.woff2?v=1710785896') format('woff2');
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --plum: #430632;
    --plum-light: #561245;
    --plum-dark: #2F0423;
    --plum-tint: #f3e8ef;
    --warm-white: #FFFFFF;
    --warm-grey: #F5F3F4;
    --text-primary: #430632;
    --text-secondary: #786874;
    --text-muted: #B8B0B5;
    --border: #E5DFE3;
    --mist: #E5DFE3;
    --coral: #FFA674;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --shadow-sm: 0 1px 3px rgba(67,6,50,0.06);
    --shadow-md: 0 4px 12px rgba(67,6,50,0.08);
    --shadow-lg: 0 8px 24px rgba(67,6,50,0.12);
    --font-heading: 'Kalice', Georgia, serif;
    --font-body: 'Kalice', Georgia, serif;
    --font-ui: 'Instrument Sans', -apple-system, sans-serif;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --spring: 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);

    /* Scent colours */
    --vetiver: #DFFFC2;
    --mandarin: #FFA674;
    --clary-sage: #FFBFD2;
    --juniper: #A8BBFF;
  }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; }
  body {
    padding-top: 48px;
    font-family: var(--font-body);
    background: #FAFAFA;
    color: var(--text-primary);
    line-height: 1.6;
  }

  /* ── Page Layout ── */

  .page-wrapper {
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 120px;
  }

  @media (max-width: 600px) {
    .page-wrapper { padding: 32px 16px 80px; }
  }

  .report-header {
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .report-header .meta {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }

  .report-header h1 {
    font-family: var(--font-heading);
    font-weight: 400;
    font-size: 40px;
    line-height: 1.15;
    margin-bottom: 12px;
  }

  .report-header .subtitle {
    font-size: 18px;
    color: var(--text-secondary);
    line-height: 1.5;
    max-width: 600px;
  }

  @media (max-width: 600px) {
    .report-header h1 { font-size: 30px; }
    .report-header .subtitle { font-size: 16px; }
  }

  .section-header {
    margin-bottom: 28px;
  }
  .section-title {
    font-family: var(--font-heading);
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--plum);
    margin-bottom: 4px;
  }
  .section-desc {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--text-secondary);
  }

  /* ── Variant Grid ── */

  .variant-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  @media (max-width: 880px) {
    .variant-grid {
      grid-template-columns: 1fr;
      justify-items: center;
    }
  }

  .variant-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 415px;
  }
  .variant-label {
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 0.82rem;
    color: var(--plum);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
    align-self: flex-start;
  }
  .variant-rationale {
    font-family: var(--font-ui);
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 12px;
    line-height: 1.5;
    text-align: center;
    max-width: 360px;
  }

  /* ── Preview Card ── */

  .preview-card {
    width: 430px;
    background: var(--warm-white);
    border: none;
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: var(--shadow-md);
    position: relative;
    transform-origin: top center;
  }
  @media (max-width: 470px) {
    .preview-card { width: calc(100vw - 32px); }
  }
  .preview-card--wizard {
    height: 932px;
    display: flex;
    flex-direction: column;
  }
  .preview-card--wizard > [data-wizard] {
    flex: 1;
    min-height: 0;
  }

  .proto-nav {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px;
  }
  .proto-nav__logo {
    height: 30px;
    display: block;
  }

  /* Hide the outer (static HTML) nav inside wizard cards */
  .preview-card--wizard > .proto-nav {
    display: none;
  }

  /* Hero-step nav — in flow (scrolls off) but overlays hero image */
  .wizard__step--hero .step-chrome {
    position: relative;
    z-index: 3;
  }
  .wizard__step--hero .proto-nav {
    background: transparent;
  }
  .wizard__step--hero .proto-nav__logo {
    filter: brightness(0) invert(1);
  }
  /* Pull hero content up behind the chrome for visual overlay */
  .wizard__step--hero .step-chrome ~ .hero,
  .wizard__step--hero .step-chrome ~ .vd-bg {
    margin-top: -54px; /* nav height: 12px + 30px + 12px */
  }

  /* ── Shared Step Styles ── */

  .step-heading {
    font-family: var(--font-heading);
    font-size: 1.75rem;
    font-weight: 400;
    color: var(--plum);
    margin: 4px 0 4px;
    line-height: 1.2;
  }
  .step-heading[tabindex] { outline: none; }
  .step-sub {
    font-family: var(--font-ui);
    font-size: 1rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
    font-weight: 400;
    line-height: 1.5;
  }
  .trust-line {
    font-family: var(--font-ui);
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin-bottom: 16px;
    font-weight: 400;
    line-height: 1.5;
  }
  .trust-line .stars { color: var(--plum); letter-spacing: 1px; }
  .trust-line strong { font-weight: 500; color: var(--text-primary); }

  .skip-link {
    display: block;
    text-align: center;
    margin-top: 16px;
    font-size: 0.82rem;
    color: var(--text-muted);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    background: none;
    border: none;
    font-family: var(--font-ui);
    padding: 8px;
    width: 100%;
  }
  .skip-link:focus-visible {
    outline: 2px solid var(--plum);
    outline-offset: 2px;
  }

  /* ── Interstitial (Trust Builder intro) ── */

  .intro-panel {
    background: var(--warm-grey);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-top: 16px;
  }
  .intro-point {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 0;
  }
  .intro-point + .intro-point {
    margin-top: 4px;
  }
  .intro-point__icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    color: var(--plum);
    margin-top: 1px;
  }
  .intro-point__icon svg {
    width: 100%;
    height: 100%;
  }
  .intro-point__text {
    flex: 1;
    min-width: 0;
  }
  .intro-point__title {
    font-family: var(--font-ui);
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .intro-point__detail {
    font-family: var(--font-ui);
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.3;
    margin-top: 1px;
  }
  .wizard__step--scent .sheet-accordion { margin-top: 12px; }

  /* ── Product info sheet content ── */

  .product-info__section {
    margin-bottom: 16px;
  }
  .product-info__section:last-child {
    margin-bottom: 0;
  }
  .product-info__heading {
    font-family: var(--font-heading);
    font-size: 1rem;
    font-weight: 400;
    color: var(--plum);
    margin-bottom: 6px;
  }
  .product-info__list {
    list-style: none;
    font-family: var(--font-ui);
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .product-info__list li::before {
    content: '\2022';
    color: var(--plum);
    margin-right: 6px;
  }
  .product-info__steps {
    list-style: none;
    counter-reset: steps;
    font-family: var(--font-ui);
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .product-info__steps li {
    counter-increment: steps;
    padding-left: 4px;
  }
  .product-info__steps li::before {
    content: counter(steps) '. ';
    font-weight: 500;
    color: var(--plum);
  }
  .product-info__text {
    font-family: var(--font-ui);
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.6;
    margin: 0;
  }

  /* ── Selection Check Mark ── */

  .check {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 20px;
    height: 20px;
    background: var(--plum);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(0);
    transition: transform var(--spring);
    z-index: 3;
  }
  .selected .check { transform: scale(1); }
  .check svg { width: 11px; height: 11px; }

  /* ── Badge — image-bottom overlay ── */
  .badge {
    position: absolute;
    bottom: 6px;
    left: 8px;
    top: auto;
    right: auto;
    background: var(--plum-tint);
    color: var(--plum);
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: var(--radius-sm);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    z-index: 4;
  }

  /* ── Shared: Learn More link ── */

  .learn-more {
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--plum);
    text-decoration: underline;
    text-underline-offset: 2px;
    padding: 2px 0;
    white-space: nowrap;
  }
  .learn-more:hover { color: var(--plum-light); }

  /* "more" link — standalone version for scent cards */
  .more-link {
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--plum);
    text-decoration: underline;
    text-underline-offset: 2px;
    padding: 2px 0;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .more-link:hover { color: var(--plum-light); }

  /* ── C1 — Base Card ── */

  .c1-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .c1-card {
    position: relative;
    background: #fff;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: border-color var(--transition), box-shadow var(--transition);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    border: 1px solid transparent;
    box-shadow: var(--shadow-sm);
  }
  .c1-card:active { transform: scale(0.98); transition: transform 80ms ease-out; }
  .c1-card:focus-visible { outline: 2px solid var(--plum); outline-offset: 2px; }
  .c1-card.selected {
    border: 1px solid var(--plum);
    box-shadow: 0 0 0 1px var(--plum);
  }
  .c1-card__image {
    width: 100%;
    height: 140px;
    overflow: hidden;
    position: relative;
  }
  .c1-card__image img { width: 100%; height: 100%; object-fit: cover; }
  .c1-card__info {
    padding: 8px 10px 10px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .c1-card__name {
    font-family: var(--font-heading);
    font-weight: 400;
    font-size: 1rem;
    color: var(--plum);
    line-height: 1.2;
  }
  .c1-card__desc {
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.3;
    margin: 3px 0 6px;
  }
  .c1-card__footer {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: auto;
  }
  .c1-card__price {
    font-size: 1rem;
    font-family: var(--font-heading);
    color: var(--plum);
    font-weight: 400;
  }

  /* ── S1 — Hero Layout ── */

  .s1-content {
    padding: 20px 20px 24px;
  }
  .s1-content .trust-line {
    font-size: 0.8125rem;
    margin-bottom: 10px;
  }
  .s1-content .step-heading {
    margin-bottom: 12px;
  }
  .s1-content .step-sub {
    font-style: normal;
    font-size: 1rem;
    font-family: var(--font-heading);
    color: var(--plum);
    margin-bottom: 16px;
  }
  .s1-content .selectors {
    margin-bottom: 24px;
  }
  .wizard__step--hero .s1-content {
    background: #fff;
    border-radius: 16px 16px 0 0;
    box-shadow: var(--shadow-md);
    position: relative;
    margin-top: -24px;
    padding-bottom: 90px;
  }
  .hero {
    width: 100%;
    height: 470px;
    position: relative;
    overflow: hidden;
    background: var(--warm-grey);
    flex-shrink: 0;
  }
  .hero__img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 300ms ease;
  }
  .hero__img--active {
    opacity: 1;
  }
  video.hero__img {
    object-fit: cover;
  }
  .hero__thumbs {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    z-index: 2;
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 16px;
  }
  .hero__thumb {
    width: 65px;
    height: 65px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    padding: 0;
    cursor: pointer;
    overflow: hidden;
    box-shadow: var(--shadow-md);
    transition: border-color 200ms ease;
    background: none;
    flex-shrink: 0;
  }
  .hero__thumb--active {
    border-color: var(--plum);
  }
  .hero__thumb img,
  .hero__thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* ── Enhanced Selectors ── */
  .selectors-label {
    font-family: var(--font-heading);
    font-size: 0.875rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.01em;
    margin-bottom: 10px;
  }
  .selectors {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 0 4px;
  }
  .selector {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    border: none;
    background: none;
    padding: 4px;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    flex: 1;
  }
  .selector__circle {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 3px solid var(--warm-white);
    box-shadow: 0 0 0 1px var(--text-muted), var(--shadow-md);
    transition: box-shadow 200ms ease, transform var(--spring), border-color 200ms ease;
    position: relative;
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
  }
  .selector:hover .selector__circle {
    box-shadow: 0 0 0 1px var(--plum), var(--shadow-md);
  }
  .selector:active .selector__circle {
    transform: scale(0.95);
  }

  /* Gemstone ball photos */
  .selector[data-case="rose-quartz"] .selector__circle {
    background-image: url('Rose_Rollr_Ball_Crop.png');
  }
  .selector[data-case="green-aventurine"] .selector__circle {
    background-image: url('Green_Rollr_Ball_Crop.png');
  }
  .selector[data-case="blue-dumortierite"] .selector__circle {
    background-image: url('Blue_Rollr_Ball_Crop.png');
  }
  .selector[data-case="steel"] .selector__circle {
    background-image: url('Steel_Rollr_Ball_Crop.png');
  }

  /* Selected state: plum ring with white buffer */
  .selector--active .selector__circle {
    box-shadow: 0 0 0 2px var(--plum), var(--shadow-md);
  }

  /* Checkmark overlay */
  .selector__check {
    position: absolute;
    bottom: -2px;
    right: -2px;
    width: 18px;
    height: 18px;
    background: var(--plum);
    border-radius: 50%;
    border: 2px solid var(--warm-white);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0);
    transition: opacity 150ms ease, transform var(--spring);
  }
  .selector--active .selector__check {
    opacity: 1;
    transform: scale(1);
  }
  .selector__check svg {
    width: 10px;
    height: 10px;
  }

  /* Name label */
  .selector__name {
    font-family: var(--font-ui);
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.2;
    transition: color 200ms ease;
  }
  .selector--active .selector__name {
    color: var(--text-primary);
    font-weight: 600;
  }

  /* Price beneath name */
  .selector__price {
    font-family: var(--font-ui);
    font-size: 0.625rem;
    font-weight: 500;
    color: var(--text-muted);
    transition: color 200ms ease;
  }
  .selector--active .selector__price {
    color: var(--text-secondary);
  }

  /* Most popular badge */
  .selector__badge {
    font-family: var(--font-ui);
    font-size: 0.5625rem;
    font-weight: 600;
    color: var(--plum);
    background: var(--plum-tint);
    padding: 1px 6px;
    border-radius: 4px;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .case-info {
    border-left: 2px solid var(--plum);
    padding-left: 16px;
  }
  .case-info__header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }
  .case-info__name {
    font-family: var(--font-heading);
    font-size: 1.25rem;
    font-weight: 400;
    color: var(--plum);
  }
  .case-info__desc {
    font-family: var(--font-heading);
    font-style: italic;
    font-size: 1rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .case-info__dot {
    color: var(--text-muted);
    font-size: 1.2rem;
    line-height: 1;
  }
  .case-info__price {
    font-family: var(--font-heading);
    font-size: 1rem;
    font-weight: 400;
    color: var(--plum);
  }
  .case-info__badge {
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--plum);
    background: var(--plum-tint);
    padding: 2px 8px;
    border-radius: var(--radius-sm);
  }

  /* ── Bottom Sheet ── */

  .sheet-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(67,6,50,0.25);
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .sheet-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }

  .sheet {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    z-index: 11;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 85%;
    overflow-y: auto;
  }
  .sheet.open {
    transform: translateY(0);
  }

  .sheet__handle {
    width: 32px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 0;
  }

  .sheet__body {
    padding: 16px 20px 24px;
    position: relative;
  }

  .sheet__image {
    position: relative;
    width: 100%;
    height: 280px;
    border-radius: var(--radius-md);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .sheet__image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .sheet__image .sheet__review {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 40px 20px 16px;
    color: white;
    text-align: center;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
    margin-bottom: 0;
  }
  .sheet__image .sheet__review-stars {
    color: white;
  }
  .sheet__image .sheet__review-author {
    color: rgba(255,255,255,0.7);
  }

  .sheet__header-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .sheet__name {
    font-family: var(--font-heading);
    font-weight: 400;
    font-size: 1.05rem;
    color: var(--plum);
  }

  .sheet__desc {
    font-family: var(--font-heading);
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .sheet__desc:last-of-type {
    margin-bottom: 1.6em;
  }

  .sheet__notes {
    font-family: var(--font-ui);
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .sheet__notes strong {
    font-weight: 500;
    color: var(--text-secondary);
  }

  .sheet__review {
    padding: 10px 0;
    margin-bottom: 10px;
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--plum);
    line-height: 1.4;
    text-align: center;
  }
  .sheet__review-stars {
    color: var(--plum);
    font-size: 0.8125rem;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .sheet__review-author {
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .sheet__price {
    font-family: var(--font-heading);
    font-size: 1rem;
    font-weight: 400;
    color: var(--plum);
  }

  .sheet__price-block {
    margin-bottom: 4px;
  }
  .sheet__price-main {
    font-family: var(--font-heading);
    font-size: 0.88rem;
    font-weight: 400;
    color: var(--plum);
  }
  .sheet__price-sub {
    font-family: var(--font-ui);
    font-size: 0.74rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.4;
  }

  .sheet__footer {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .sheet__close-link {
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--plum);
    text-decoration: underline;
    text-underline-offset: 2px;
    padding: 0;
    margin-left: auto;
  }
  .sheet__close-link:hover { color: var(--plum-light); }

  /* ── Sheet Accordion ── */

  .sheet-accordion {
    margin-top: 4px;
  }
  .sheet-accordion__item {
    overflow: hidden;
  }
  .sheet-accordion__trigger {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 12px 0;
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-heading);
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--plum);
    text-align: left;
    line-height: 1.3;
    -webkit-tap-highlight-color: transparent;
  }
  .sheet-accordion__trigger:hover {
    color: var(--plum-light);
  }
  .sheet-accordion__icon {
    font-family: var(--font-ui);
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-left: 12px;
    transition: transform 0.3s ease;
    user-select: none;
    line-height: 1;
  }
  .sheet-accordion__body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .sheet-accordion__content {
    padding-bottom: 14px;
  }
  .sheet-accordion--dividers .sheet-accordion__item + .sheet-accordion__item {
    border-top: 1px solid var(--border);
  }

  /* ── S2 — Scent Cards ── */

  .s2-card {
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .s2-card.selected .s2-card__image {
    box-shadow: 0 0 0 3px #fff, 0 0 0 4px var(--plum), var(--shadow-sm);
  }

  .s2-card__image {
    width: 100%;
    height: 180px;
    overflow: hidden;
    position: relative;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
  }
  .s2-card__image img { width: 100%; height: 100%; object-fit: cover; }

  /* Tappable card body — whole card except footer opens modal */
  .s2-card__tap-area {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    border-radius: var(--radius-md) var(--radius-md) 0 0;
    transition: opacity 0.15s ease;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .s2-card__tap-area:hover { opacity: 0.88; }

  .s2-card__info {
    padding: 10px 4px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* Title row */
  .s2-card__title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 6px;
  }
  .s2-card__name {
    font-family: var(--font-heading);
    font-weight: 400;
    font-size: 1.25rem;
    color: var(--plum);
    line-height: 1.2;
  }

  /* Notes row — notes + Detail link */
  .s2-card__notes-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    margin-top: 3px;
  }
  .s2-card__notes {
    font-family: var(--font-ui);
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-secondary);
    line-height: 1.3;
    letter-spacing: 0.01em;
  }

  /* Price block */
  .s2-card__price-block {
    margin-top: auto;
    padding-top: 14px;
  }
  .s2-card__price-main {
    font-family: var(--font-heading);
    font-size: 1rem;
    color: var(--plum);
    font-weight: 400;
    line-height: 1.2;
  }
  .s2-card__price-detail {
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.3;
    margin-top: 2px;
  }

  .s2-card__footer {
    margin-top: auto;
    padding: 12px 4px 4px;
  }

  /* Add button — plum filled */
  .s2-card__add {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 44px;
    border: 2px solid var(--plum);
    border-radius: var(--radius-sm);
    background: var(--plum);
    font-family: var(--font-ui);
    font-size: 0.88rem;
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: background 0.2s ease, color 0.2s ease;
  }
  .s2-card__add:hover {
    background: var(--plum-light);
    border-color: var(--plum-light);
  }

  /* Stepper — outlined container, borderless buttons inside */
  .s2-stepper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    height: 44px;
    border: 1px solid var(--plum);
    border-radius: var(--radius-sm);
    background: #fff;
    padding: 0 4px;
  }
  .s2-stepper__btn {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: var(--radius-sm);
    background: transparent;
    font-size: 1.2rem;
    color: var(--plum);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
  }
  .s2-stepper__btn:hover {
    background: var(--plum-tint);
  }
  .s2-stepper__qty {
    font-family: var(--font-ui);
    font-size: 1rem;
    font-weight: 600;
    color: var(--plum);
  }

  /* Qty badge on shelf thumbs */
  .s3-shelf__scent-thumb-wrap {
    position: relative;
    display: inline-block;
  }
  .s3-shelf__qty-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--plum);
    color: #fff;
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 600;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #fff;
    z-index: 1;
  }

  /* ── S2 Header sub-line ── */

  .step-sub--brandy {
    font-family: var(--font-heading);
    font-style: italic;
    font-weight: 400;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 6px;
    margin-bottom: 18px;
    line-height: 1.6;
  }

  /* ── Plan tab bar ── */

  .plan-tabs {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 0;
    margin-bottom: 0;
  }
  .plan-tabs__tab {
    border: none;
    background: none;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 0.84rem;
    font-weight: 500;
    color: var(--text-muted);
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s ease, font-weight 0.15s ease;
    line-height: 1.3;
    white-space: nowrap;
  }
  .plan-tabs__tab--active {
    color: var(--plum);
    font-weight: 600;
  }
  .plan-tabs__badge {
    font-family: var(--font-ui);
    font-size: 0.6rem;
    font-weight: 600;
    color: #fff;
    background: #D4722F;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    vertical-align: middle;
    line-height: 1;
  }
  .plan-tabs--lg .plan-tabs__tab { font-size: 1rem; }

  /* ── Plan meta strip ── */

  .plan-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding: 6px 0;
    margin-bottom: 14px;
  }
  .plan-meta__item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--plum);
    white-space: nowrap;
  }
  .plan-meta__check {
    font-size: 0.72rem;
  }

  /* ── Body-zone heading ── */

  .step-body__heading {
    font-family: var(--font-heading);
    font-size: 1.25rem;
    font-weight: 400;
    color: var(--plum);
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .step-body__sub {
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-secondary);
    margin-bottom: 14px;
  }

  /* ── Scent-step zones ── */
  .step-header {
    padding: 20px 20px 0;
  }
  .step-body {
    background: #fff;
    border-radius: 16px 16px 0 0;
    box-shadow: var(--shadow-md);
    padding: 16px 20px 90px;
  }
  .wizard__step--scent {
    background: #fafafa;
    padding: 0;
  }
  .wizard__step--scent .proto-nav {
    background: transparent;
  }
  .wizard__step--plan {
    background: #fafafa;
    padding: 0;
  }
  .wizard__step--plan .proto-nav {
    background: transparent;
  }
  .wizard__step--checkout {
    background: #fafafa;
    padding: 0;
  }
  .wizard__step--checkout .proto-nav {
    background: transparent;
  }
  /* ── Spec Panel ── */

  .spec-panel {
    margin-top: 40px;
    background: white;
    border: none;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .spec-toggle {
    display: block;
    width: 100%;
    padding: 14px 20px;
    font-family: var(--font-ui);
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--plum);
    cursor: pointer;
    list-style: none;
    user-select: none;
  }
  .spec-toggle::-webkit-details-marker { display: none; }
  .spec-toggle::before {
    content: '\25B8';
    display: inline-block;
    margin-right: 8px;
    transition: transform 0.2s ease;
  }
  .spec-panel[open] .spec-toggle::before { transform: rotate(90deg); }
  .spec-content {
    padding: 0 20px 20px;
    font-family: var(--font-ui);
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .spec-content h3 {
    font-family: var(--font-ui);
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-primary);
    margin: 16px 0 4px;
  }
  .spec-content h3:first-child { margin-top: 0; }
  .spec-content ul {
    padding-left: 18px;
    margin: 4px 0;
  }
  .spec-content li { margin-bottom: 2px; }
  .spec-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 0.78rem;
  }
  .spec-content th, .spec-content td {
    padding: 6px 10px;
    border: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }
  .spec-content th {
    background: var(--warm-grey);
    font-weight: 600;
    color: var(--text-primary);
  }

  /* ── Proto label ── */
  .prototype-hero {
    max-width: 460px;
    margin: 0 auto;
    overflow: visible;
  }

  /* ── Step 3: Delivery ── */

  .s3-toggle {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 14px;
  }
  .s3-option {
    position: relative;
    border: 1px solid transparent;
    border-radius: var(--radius-md);
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color var(--transition), box-shadow var(--transition);
    background: white;
    box-shadow: var(--shadow-sm);
  }
  .s3-option:hover {
    border-color: var(--plum-light);
  }
  .s3-option--active {
    border-color: var(--plum);
    box-shadow: 0 0 0 1px var(--plum);
  }
  .s3-option__title {
    font-family: var(--font-heading);
    font-size: 0.88rem;
    font-weight: 400;
    color: var(--plum);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .s3-option__price {
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-primary);
    margin-top: 2px;
  }
  .s3-option__price s {
    color: var(--text-muted);
    font-size: 0.78rem;
  }
  .s3-option__meta {
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .s3-badge {
    display: inline-block;
    background: var(--plum-tint);
    color: var(--plum);
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: var(--radius-sm);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .s3-social {
    font-family: var(--font-ui);
    font-size: 0.72rem;
    font-style: italic;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 8px;
  }

  .s3-trust {
    display: flex;
    justify-content: center;
    gap: 16px;
    background: var(--plum-tint);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .s3-trust__item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--plum);
    white-space: nowrap;
  }
  .s3-trust__check {
    font-size: 0.8125rem;
  }

  .s3-benefits {
    list-style: none;
    margin: 8px 0 0;
  }
  .s3-benefits__item {
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-family: var(--font-ui);
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-secondary);
    padding: 2px 0;
  }
  .s3-benefits__check {
    color: var(--plum);
    font-size: 0.72rem;
    flex-shrink: 0;
  }

  .s3-save-pill {
    display: inline-block;
    background: var(--plum);
    color: white;
    font-size: 0.8125rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  /* ── D5: Product shelf ── */

  .s3-shelf {
    display: flex;
    gap: 20px;
    padding: 12px 0 8px;
    justify-content: center;
  }
  .s3-shelf__product {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
    max-width: 150px;
  }
  .s3-shelf__product img {
    width: 120px;
    height: 120px;
    border-radius: var(--radius-sm);
    object-fit: cover;
  }
  .s3-shelf__product-name {
    font-family: var(--font-heading);
    font-size: 0.88rem;
    font-weight: 400;
    color: var(--plum);
    text-align: center;
    line-height: 1.2;
  }
  .s3-shelf__label {
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-secondary);
    text-align: center;
  }

  .s3-shelf__scents {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .s3-shelf__scent-thumbs {
    display: flex;
    gap: 6px;
    justify-content: center;
    align-items: center;
    min-height: 120px;
  }
  .s3-shelf__scent-thumbs img {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid white;
    box-shadow: 0 1px 4px rgba(67,6,50,0.08);
  }
  .s3-shelf__scent-thumbs--single img {
    width: 80px;
    height: 80px;
  }
  .s3-shelf__scent-thumbs--grid {
    flex-wrap: wrap;
    max-width: 124px;
  }
  .s3-shelf__scent-names {
    font-family: var(--font-heading);
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--plum);
    text-align: center;
    line-height: 1.3;
  }

  /* Collapse behaviour */
  .s3-toggle--once .s3-option[data-s3-choice="subscribe"] .s3-option__badge-row,
  .s3-toggle--once .s3-option[data-s3-choice="subscribe"] .s3-benefits,
  .s3-toggle--once .s3-option[data-s3-choice="subscribe"] .s3-social {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    margin: 0;
    padding: 0;
    transition: max-height 0.3s ease, opacity 0.2s ease, margin 0.3s ease;
  }
  .s3-option[data-s3-choice="subscribe"] .s3-option__badge-row,
  .s3-option[data-s3-choice="subscribe"] .s3-benefits,
  .s3-option[data-s3-choice="subscribe"] .s3-social {
    max-height: 200px;
    transition: max-height 0.3s ease, opacity 0.3s ease 0.05s, margin 0.3s ease;
  }
  .s3-toggle--once + .s3-trust {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    margin-top: 0;
    padding: 0;
    transition: max-height 0.3s ease, opacity 0.3s ease, margin 0.3s ease, padding 0.3s ease;
  }
  .s3-trust {
    transition: max-height 0.3s ease, opacity 0.3s ease, margin 0.3s ease, padding 0.3s ease;
    max-height: 100px;
    overflow: hidden;
  }

  .s3-option__badge-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .s3-option__price-month {
    font-family: var(--font-heading);
    font-size: 1.15rem;
    font-weight: 400;
    color: var(--plum);
    line-height: 1;
    margin-top: 2px;
  }
  .s3-option__price-month small {
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-secondary);
  }
  .s3-option__price-detail {
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ═══════════════════════════════════════ */
  /* NEW: Wizard Layout                      */
  /* ═══════════════════════════════════════ */

  .wizard {
    position: relative;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .wizard__progress {
    padding: 12px 20px 0;
    flex-shrink: 0;
  }
  .wizard > .wizard__progress[data-wizard-progress] {
    display: none;
  }
  .wizard__progress--hidden {
    display: none;
  }
  .wizard__progress-text {
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-align: center;
  }
  .wizard__steps {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .wizard__step {
    position: absolute;
    inset: 0;
    padding: 12px 20px 80px;
    overflow-y: auto;
    transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1), opacity 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .wizard__step--active {
    transform: translateX(0);
    opacity: 1;
  }
  .wizard__step--left {
    transform: translateX(-30%);
    opacity: 0;
    pointer-events: none;
  }
  .wizard__step--right {
    transform: translateX(100%);
    opacity: 0;
    pointer-events: none;
  }

  @media (prefers-reduced-motion: reduce) {
    .wizard__step {
      transition-duration: 150ms !important;
      transition-property: opacity !important;
    }
    .wizard__step--left,
    .wizard__step--right {
      transform: translateX(0) !important;
    }
  }

  /* Progress bar segments */
  .progress { display: flex; gap: 4px; }
  .progress__seg {
    flex: 1;
    height: 4px;
    border-radius: var(--radius-sm);
    background: var(--border);
    transition: background 400ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress__seg--active,
  .progress__seg--done { background: var(--plum); }
  .progress__seg--half {
    background: linear-gradient(to right, var(--plum) 50%, var(--border) 50%);
  }
  .progress__labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    padding-bottom: 8px;
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-muted);
  }
  .progress__labels span {
    flex: 1;
    text-align: center;
  }
  .progress__label--active {
    color: var(--plum) !important;
    font-weight: 500 !important;
  }
  .progress__label--done {
    color: var(--plum) !important;
  }

  /* Cover-active: white progress bar over full-bleed image */
  .wizard--cover-active .wizard__progress {
    position: absolute;
    top: 50px;
    left: 0;
    right: 0;
    z-index: 2;
    background: transparent;
  }
  .wizard--cover-active .wizard__steps {
    flex: 1;
  }
  .wizard--cover-active .wizard__step--active {
    top: 0;
    padding-top: 0;
  }
  .wizard--cover-active .progress__seg {
    background: rgba(255,255,255,0.3);
  }
  .wizard--cover-active .progress__seg--done {
    background: #fff;
  }
  .wizard--cover-active .progress__seg--half {
    background: linear-gradient(to right, #fff 50%, rgba(255,255,255,0.3) 50%);
  }
  .wizard--cover-active .progress__labels {
    color: rgba(255,255,255,0.5);
  }
  .wizard--cover-active .progress__label--active {
    color: #fff !important;
  }
  .wizard--cover-active .progress__label--done {
    color: rgba(255,255,255,0.7) !important;
  }
  .wizard--cover-active .wizard__progress-text {
    color: rgba(255,255,255,0.7);
  }

  /* Bottom bar */
  .wizard__bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    min-height: 64px;
    background: var(--plum-tint);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    z-index: 5;
  }
  .wizard__bar--hidden { display: none; }
  .wizard__bar-summary {
    font-family: var(--font-ui);
    font-size: 0.875rem;
    font-weight: 400;
    color: var(--text-secondary);
    flex: 1;
    margin-right: 12px;
    min-width: 0;
    line-height: 1.3;
  }
  .wizard__bar-summary strong {
    display: block;
    font-weight: 600;
    color: var(--plum);
  }
  .wizard__bar-summary .bar-price {
    font-size: 0.8125rem;
    color: var(--text-secondary);
  }
  .wizard__bar-cta {
    background: var(--plum);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    font-family: var(--font-ui);
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s ease, background 0.2s ease;
    flex-shrink: 0;
  }
  .wizard__bar-cta:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .wizard__bar-cta--final {
    background: var(--plum);
    color: white;
  }

  @keyframes price-pulse {
    0% { opacity: 0.5; transform: scale(0.96); }
    50% { transform: scale(1.02); }
    100% { opacity: 1; transform: scale(1); }
  }
  .wizard__bar-summary--animate {
    animation: price-pulse 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Back button — lives in the bottom bar */
  .wizard__bar-back {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: white;
    color: var(--plum);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    margin-right: 10px;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .wizard__bar-back:hover {
    border-color: var(--plum);
    background: var(--plum-tint);
  }
  .wizard__bar-back--hidden { display: none; }
  .wizard__bar-back svg {
    width: 14px;
    height: 14px;
  }

  /* Step 2 social proof review */
  .s2-review {
    margin-top: 14px;
    padding: 10px 0;
    font-family: var(--font-body);
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--plum);
    line-height: 1.4;
    text-align: center;
    transition: opacity 0.3s ease;
    min-height: 60px;
  }
  .s2-review__stars {
    color: var(--plum);
    font-size: 0.8125rem;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .s2-review__author {
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .s2-review--light {
    color: #fff;
  }
  .s2-review--light .s2-review__stars {
    color: #fff;
  }
  .s2-review--light .s2-review__author {
    color: rgba(255,255,255,0.7);
  }
  .s2-review--on-image {
    position: absolute;
    bottom: 36px;
    left: 20px;
    right: 20px;
    z-index: 1;
    margin: 0;
  }

  /* Checkout summary */
  .checkout { padding: 8px 0; }
  .checkout__icon { font-size: 1.5rem; color: var(--plum); margin-bottom: 4px; }
  .checkout__heading {
    font-family: var(--font-heading);
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--plum);
    margin-bottom: 16px;
    outline: none;
  }
  .checkout__lines { margin-bottom: 4px; }
  .checkout__line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    font-family: var(--font-ui);
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-secondary);
  }
  .checkout__line-name { flex: 1; }
  .checkout__line-price {
    font-family: var(--font-heading);
    font-weight: 400;
    color: var(--text-primary);
    white-space: nowrap;
  }
  .checkout__divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 8px 0;
  }
  .checkout__line--delivery { color: var(--plum); }
  .checkout__line--delivery .checkout__line-price {
    color: var(--plum);
    font-weight: 500;
  }
  .checkout__line--total { font-weight: 500; }
  .checkout__line--total .checkout__line-name {
    color: var(--text-primary);
    font-weight: 500;
  }
  .checkout__line--total .checkout__line-price {
    font-size: 0.92rem;
    font-weight: 400;
    color: var(--plum);
  }
  .checkout__recurring {
    font-family: var(--font-ui);
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .checkout__restart {
    display: block;
    width: 100%;
    margin-top: 24px;
    padding: 12px;
    background: var(--plum-tint);
    color: var(--plum);
    border: 1px solid var(--plum);
    border-radius: var(--radius-sm);
    font-family: var(--font-ui);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s ease;
  }
  .checkout__restart:hover { background: #e8d5e2; }

  /* Trust Builder overrides */
  .wizard--trust .s3-option[data-s3-choice="subscribe"] {
    border-color: var(--plum);
  }

  /* Screen reader only */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /* ══════════════════════════════════════
     Interstitial Design Explorations
     ══════════════════════════════════════ */

  .component-section + .component-section {
    margin-top: 48px;
  }

  .explore-card {
    padding: 20px;
  }

  /* ── Direction A: Editorial ── */

  .ed-hero {
    width: calc(100% + 40px);
    margin: -20px -20px 0;
    height: 180px;
    overflow: hidden;
    position: relative;
  }
  .ed-hero--step {
    width: calc(100% + 40px);
    margin: -12px -20px 0;
  }
  .ed-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .ed-hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: linear-gradient(transparent, var(--warm-white));
  }

  .ed-heading {
    font-family: var(--font-heading);
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--plum);
    text-align: center;
    margin: 20px 0 4px;
    line-height: 1.2;
  }
  .ed-heading[tabindex] { outline: none; }
  .ed-sub {
    font-family: var(--font-ui);
    font-size: 0.82rem;
    font-weight: 400;
    font-style: italic;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .ed-point {
    padding: 12px 0;
  }
  .ed-point:last-of-type {
  }
  .ed-point__title {
    font-family: var(--font-heading);
    font-size: 0.92rem;
    font-weight: 400;
    color: var(--plum);
    line-height: 1.2;
  }
  .ed-point__detail {
    font-family: var(--font-ui);
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-top: 2px;
  }

  .ed-badge {
    display: block;
    text-align: center;
    margin: 16px 0;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--plum);
    background: var(--plum-tint);
    padding: 6px 16px;
    border-radius: 20px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }

  /* ── Editorial Variants ── */

  /* — A: Dark Cover — */
  .ed-cover {
    position: relative;
    min-height: 520px;
    margin: -20px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 60px 28px 28px;
    overflow: hidden;
  }
  .wizard__step .ed-cover {
    justify-content: flex-start;
    margin: 0;
    min-height: 100%;
    padding-top: 80px;
  }

  /* Staggered fade-in for interstitial content */
  @keyframes ed-fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .ed-cover--animate .ed-cover__heading,
  .ed-cover--animate .ed-cover__pt,
  .ed-cover--animate .ed-cover__badge {
    opacity: 0;
    animation: ed-fade-up 400ms ease-out forwards;
  }
  .ed-cover--animate .ed-cover__heading { animation-delay: 200ms; }
  .ed-cover--animate .ed-cover__pt:nth-child(1) { animation-delay: 350ms; }
  .ed-cover--animate .ed-cover__pt:nth-child(2) { animation-delay: 450ms; }
  .ed-cover--animate .ed-cover__pt:nth-child(3) { animation-delay: 550ms; }
  .ed-cover--animate .ed-cover__pt:nth-child(4) { animation-delay: 650ms; }
  .ed-cover--animate .ed-cover__badge { animation-delay: 800ms; }

  @media (prefers-reduced-motion: reduce) {
    .ed-cover--animate .ed-cover__heading,
    .ed-cover--animate .ed-cover__pt,
    .ed-cover--animate .ed-cover__badge {
      opacity: 1;
      animation: none;
    }
  }
  .ed-cover__img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .ed-cover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--plum-dark) 0%, rgba(46,4,34,0.92) 40%, rgba(46,4,34,0.55) 70%, rgba(46,4,34,0.15) 90%, transparent 100%);
    pointer-events: none;
  }
  .ed-cover__body {
    position: relative;
    z-index: 1;
    text-align: left;
    color: #fff;
  }
  .ed-cover__heading {
    font-family: var(--font-heading);
    font-size: 1.5rem;
    font-weight: 400;
    text-shadow: 0 1px 3px rgba(67,6,50,0.4);
    margin: 0 0 8px;
    color: #fff;
  }
  .ed-cover__sub {
    font-family: var(--font-ui);
    font-size: 0.78rem;
    font-weight: 400;
    opacity: 0.9;
    margin: 0 0 24px;
    color: #fff;
    line-height: 1.5;
  }
  .ed-cover__points {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin: 0 0 22px;
  }
  .ed-cover__pt {
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    color: #fff;
  }
  .ed-cover__pt-title {
    font-family: var(--font-heading);
    font-size: 0.85rem;
    font-weight: 400;
  }
  .ed-cover__pt-detail {
    font-family: var(--font-ui);
    font-size: 0.72rem;
    font-weight: 400;
    opacity: 0.85;
    margin-top: 2px;
    line-height: 1.5;
  }
  .ed-cover__pt:first-child { border-top: 1px solid rgba(255,255,255,0.15); }
  .ed-cover__badge {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 500;
    color: #fff;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    padding: 10px 22px;
    border-radius: 24px;
    margin: 0;
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
    text-shadow: none;
  }
  .ed-cover__link {
    display: block;
    text-align: left;
    margin-top: 8px;
    font-family: var(--font-ui);
    font-size: 0.75rem;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    text-decoration: underline;
  }

  /* — D (v2): Magazine Spread — */
  .vd-bg {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #fafafa;
  }
  .vd-photo {
    position: relative;
    height: 440px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .vd-photo__img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .vd-heading {
    font-family: var(--font-heading);
    font-size: 1.75rem;
    font-weight: 400;
    color: var(--plum);
    line-height: 1.2;
    margin: 0 0 8px;
    outline: none;
  }
  .vd-body {
    padding: 20px 24px 24px;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 16px 16px 0 0;
    position: relative;
    margin-top: -24px;
    padding-bottom: 90px;
  }
  .vd-sub {
    font-family: var(--font-heading);
    font-style: normal;
    font-size: 1rem;
    font-weight: 400;
    color: var(--plum);
    margin: 0 0 16px;
    line-height: 1.5;
  }
  .vd-sub--next {
    font-family: var(--font-heading);
    font-size: 1.25rem;
    font-style: normal;
    font-weight: 400;
    color: var(--plum);
  }
  .vd-press {
    margin: 0 0 20px;
    text-align: center;
  }
  .vd-press__logo {
    height: 40px;
    width: auto;
    display: block;
    margin: 0 auto 8px;
    object-fit: contain;
  }
  .vd-press__quote {
    font-family: var(--font-heading);
    font-style: italic;
    font-size: 0.9375rem;
    color: var(--text-secondary);
    line-height: 1.4;
  }
  .vd-press--left {
    text-align: left;
  }
  .vd-press--left .vd-press__logo {
    margin: 0 0 8px;
  }
  .vd-ticks {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 4px 0 0;
  }
  .vd-ticks__item {
    font-family: var(--font-ui);
    font-size: 0.875rem;
    color: var(--text-primary);
    line-height: 1.4;
    padding-left: 24px;
    position: relative;
  }
  .vd-ticks__item::before {
    content: '\2713';
    position: absolute;
    left: 0;
    color: var(--plum);
    font-weight: 600;
  }
  .vd-points {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin: 0 0 18px;
  }
  .vd-pt__title {
    font-family: var(--font-heading);
    font-size: 1rem;
    font-weight: 400;
    color: var(--plum);
  }
  .vd-pt__detail {
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 2px;
    line-height: 1.5;
  }
  .vd-link {
    display: inline-block;
    font-family: var(--font-ui);
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-secondary);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    background: none;
    border: none;
  }

  /* Staggered fade-in for variant D */
  .vd-bg--animate .vd-heading,
  .vd-bg--animate .vd-sub,
  .vd-bg--animate .vd-pt,
  .vd-bg--animate .vd-link,
  .vd-bg--animate .vd-ticks__item,
  .vd-bg--animate .s2-review {
    opacity: 0;
    animation: ed-fade-up 400ms ease-out forwards;
  }
  .vd-bg--animate .vd-heading { animation-delay: 200ms; }
  .vd-bg--animate .vd-sub { animation-delay: 350ms; }
  .vd-bg--animate .vd-ticks__item:nth-child(1) { animation-delay: 500ms; }
  .vd-bg--animate .vd-ticks__item:nth-child(2) { animation-delay: 600ms; }
  .vd-bg--animate .vd-ticks__item:nth-child(3) { animation-delay: 700ms; }
  .vd-bg--animate .s2-review { animation-delay: 800ms; }
  .vd-bg--animate .vd-pt:nth-child(1) { animation-delay: 400ms; }
  .vd-bg--animate .vd-pt:nth-child(2) { animation-delay: 500ms; }
  .vd-bg--animate .vd-pt:nth-child(3) { animation-delay: 600ms; }
  .vd-bg--animate .vd-pt:nth-child(4) { animation-delay: 700ms; }
  .vd-bg--animate .vd-link { animation-delay: 850ms; }

  @media (prefers-reduced-motion: reduce) {
    .vd-bg--animate .vd-heading,
    .vd-bg--animate .vd-sub,
    .vd-bg--animate .vd-pt,
    .vd-bg--animate .vd-link,
    .vd-bg--animate .vd-ticks__item,
    .vd-bg--animate .s2-review {
      opacity: 1;
      animation: none;
    }
  }

  /* — B: Split Editorial — */
  .ed-split {
    display: flex;
    flex-direction: column;
    margin: -20px;
    overflow: hidden;
  }
  .ed-split__img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
  }
  .ed-split__body {
    background: var(--plum-dark);
    padding: 22px 24px 24px;
    color: #fff;
    flex: 1;
  }
  .ed-split__heading {
    font-family: var(--font-heading);
    font-size: 1.35rem;
    font-weight: 400;
    margin: 0 0 6px;
    text-align: left;
    color: #fff;
  }
  .ed-split__sub {
    font-family: var(--font-ui);
    font-size: 0.78rem;
    font-weight: 400;
    opacity: 0.75;
    margin: 0 0 18px;
    text-align: left;
    color: #fff;
    line-height: 1.5;
  }
  .ed-split__pt {
    font-size: 0.75rem;
    font-weight: 400;
    padding: 8px 0 8px 12px;
    border-left: 2px solid var(--plum-tint);
    margin-bottom: 8px;
    color: #fff;
  }
  .ed-split__badge {
    display: inline-block;
    font-family: var(--font-ui);
    font-size: 0.7rem;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    margin-top: 10px;
  }
  .ed-split__link {
    display: block;
    text-align: left;
    margin-top: 12px;
    font-family: var(--font-ui);
    font-size: 0.75rem;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    text-decoration: underline;
  }

  /* — C: Glass Panel — */
  .ed-glass {
    position: relative;
    min-height: 520px;
    margin: -20px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 36px 16px;
    overflow: hidden;
  }
  .ed-glass__img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  function setupSelection(grid, onSelect) {
    const cards = grid.querySelectorAll('[role="radio"]');
    cards.forEach(card => {
      const select = () => {
        cards.forEach(c => {
          c.classList.remove('selected');
          c.setAttribute('aria-checked', 'false');
        });
        card.classList.add('selected');
        card.setAttribute('aria-checked', 'true');
        if (onSelect) onSelect(card.dataset.id);
      };
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-learn]')) return;
        select();
      });
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          select();
        }
      });
    });
  }

        if (q > 0) qty[card.dataset.id] = q;
      });

    }

    function setQty(card, n) {
      const q = Math.max(0, Math.min(MAX_QTY, n));
      card.dataset.qty = q;
      const addBtn = card.querySelector('.s2-card__add');
      const stepper = card.querySelector('.s2-stepper');
      const qtyEl = card.querySelector('.s2-stepper__qty');

      if (q === 0) {
        addBtn.style.display = '';
        stepper.style.display = 'none';
        card.classList.remove('selected');
      } else {
        addBtn.style.display = 'none';
        stepper.style.display = '';
        qtyEl.textContent = q;
        card.classList.add('selected');
      }

      if (onUpdate) onUpdate(getQuantities());
    }

    grid.addEventListener('click', (e) => {
      const addBtn = e.target.closest('.s2-card__add');
      if (addBtn) {
        setQty(addBtn.closest('.s2-card'), 1);
        return;
      }

      const stepperBtn = e.target.closest('[data-stepper]');
      if (stepperBtn) {
        const card = stepperBtn.closest('.s2-card');
        const current = parseInt(card.dataset.qty, 10);
        const delta = stepperBtn.dataset.stepper === 'plus' ? 1 : -1;
        setQty(card, current + delta);
      }
    });
  }

  function createWizardState(config) {
    return {
      step: 1,
      selectedCase: cases.find(c => c.id === 'rose-quartz') || null,
      scents: scents.filter(s => s.id === 'vetiver'),
      scentQty: { vetiver: 1 },
      plan: config.defaultPlan,
      config: config,

      get casePrice() {
        return this.selectedCase ? this.selectedCase.price : 0;
      },
      get totalRefills() {
        return Object.values(this.scentQty).reduce((sum, q) => sum + q, 0);
      },
      get refillPrice() {
        return this.plan === 'subscribe' ? 12 : 15;
      },
      get refillTotal() {
        return this.totalRefills * this.refillPrice;
      },
      get deliveryCost() {
        return this.plan === 'subscribe' ? 0 : 3.95;
      },
      get orderTotal() {
        return this.casePrice + this.refillTotal + this.deliveryCost;
      },
      get billingCycleMonths() {
        return this.totalRefills * 2;
      },
      get billingTotal() {
        return this.totalRefills * 12;
      },
      get perMonth() {
        return this.plan === 'subscribe' ? this.billingTotal / this.billingCycleMonths : null;
      },
      get canContinue() {
        if (this.step === 1) return this.selectedCase !== null;
        if (this.config.interstitialStep && this.step === this.config.interstitialStep) return true;
        if (this.step === this.config.scentStep) return this.totalRefills >= 1;
        return false;
      }
    };
  }

  function createWizard(containerEl, config) {
    const state = createWizardState(config);

    // Build step divs dynamically based on config
    let stepDivs = '';
    for (let i = 1; i <= config.stepCount; i++) {
      const cls = i === 1 ? 'wizard__step--active' : 'wizard__step--right';
      stepDivs += '<div class="wizard__step ' + cls + '" data-step="' + i + '"></div>';
    }

    containerEl.innerHTML =
      '<div class="wizard wizard--' + config.id + '">' +
        '<div class="sr-only" aria-live="polite" data-step-announce></div>' +
        '<div class="wizard__progress" data-wizard-progress></div>' +
        '<div class="wizard__steps">' + stepDivs + '</div>' +
        '<div class="wizard__bar" data-wizard-bar>' +
          '<button class="wizard__bar-back wizard__bar-back--hidden" data-bar-back aria-label="Go back">' +
            '<svg viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</button>' +
          '<div class="wizard__bar-summary" aria-live="polite" data-bar-summary></div>' +
          '<button class="wizard__bar-cta" data-bar-cta disabled>Continue</button>' +
        '</div>' +
      '</div>';

    const wizardEl = containerEl.querySelector('.wizard');
    const previewCard = containerEl.closest('.preview-card');

    const wizard = {
      el: wizardEl,
      state: state,
      config: config,
      previewCard: previewCard,
      steps: Array.from(wizardEl.querySelectorAll('.wizard__step')),
      progressEl: wizardEl.querySelector('[data-wizard-progress]'),
      barEl: wizardEl.querySelector('[data-wizard-bar]'),
      barSummary: wizardEl.querySelector('[data-bar-summary]'),
      barCta: wizardEl.querySelector('[data-bar-cta]'),
      barBack: wizardEl.querySelector('[data-bar-back]'),
      announcer: wizardEl.querySelector('[data-step-announce]')
    };

    // Render initial steps
    renderStep1(wizard);
    if (config.interstitialStep) renderInterstitial(wizard);
    renderStep2(wizard);
    renderProgressBar(wizard);
    updateBottomBar(wizard);

    // CTA click
    wizard.barCta.addEventListener('click', () => {
      if (wizard.barCta.disabled) return;
      if (state.step < config.scentStep) {
        goToStep(wizard, state.step + 1);
      } else if (state.step === config.scentStep) {
        goToStep(wizard, config.checkoutStep);
      }
    });

    // Back button in bar
    wizard.barBack.addEventListener('click', () => {
      if (state.step > 1) {
        goToStep(wizard, state.step - 1);
      }
    });

    // Setup sheets
    setupWizardSheets(wizard);

    return wizard;
  }
